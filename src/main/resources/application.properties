spring.application.name=TallyAPI

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/tally_db}
spring.datasource.username=${DATASOURCE_USERNAME:tally_user}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.test}
frontend.verification.url=${FRONTEND_VERIFICATION_URL:http://localhost:5173/verify}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never